<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编制方工作台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <h1>编制方工作台</h1>

        <div class="section">
            <h2>甲方资料获取/检查/反馈</h2>
            <p>查看客户提交的项目信息（不包括私密文档）</p>
            <div class="status-indicator">
                项目状态:
                <span id="project-status" class="status-badge status-completed">已完成</span>
            </div>
            <div id="client-data"></div>
        </div>

        <div class="section">
            <h2>实时政策及编制要求查询/选取</h2>
            <div class="selection-group">
                <select id="policies-select" class="content-selector">
                    <option value="">请选择政策文件</option>
                </select>
                <div class="content-copy-container">
                    <input type="text" id="policy-copy" class="content-copy" placeholder="从文件中复制内容到这里">
                    <button class="copy-btn" data-source="policy">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <div class="structure-selector">
                    <select id="policy-section" class="structure-select">
                        <option value="">选择章节</option>
                    </select>
                    <select id="policy-chapter" class="structure-select">
                        <option value="">选择节</option>
                    </select>
                    <select id="policy-clause" class="structure-select">
                        <option value="">选择条</option>
                    </select>
                    <button id="insert-policy" class="insert-btn">插入</button>
                </div>
                <div class="file-preview" id="policy-preview"></div>
            </div>
        </div>

        <div class="section">
            <h2>通用规范图集查询/选取</h2>
            <div class="selection-group">
                <select id="standards-select" class="content-selector">
                    <option value="">请选择规范文件</option>
                </select>
                <div class="content-copy-container">
                    <input type="text" id="standard-copy" class="content-copy" placeholder="从文件中复制内容到这里">
                    <button class="copy-btn" data-source="standard">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <div class="structure-selector">
                    <select id="standard-section" class="structure-select">
                        <option value="">选择章节</option>
                    </select>
                    <select id="standard-chapter" class="structure-select">
                        <option value="">选择节</option>
                    </select>
                    <select id="standard-clause" class="structure-select">
                        <option value="">选择条</option>
                    </select>
                    <button id="insert-standard" class="insert-btn">插入</button>
                </div>
                <div class="file-preview" id="standard-preview"></div>
            </div>
        </div>

        <div class="section">
            <h2>往期/现期工程参考</h2>
            <p>查询历史项目和当前项目参考</p>
            <input type="text" placeholder="搜索参考项目...">
            <div id="references-list"></div>
        </div>

        <div class="section">
            <h2>模板选择</h2>
            <div class="selection-group">
                <select id="templates-select" class="content-selector">
                    <option value="">请选择模板文件</option>
                </select>
                <div class="content-copy-container">
                    <input type="text" id="template-copy" class="content-copy" placeholder="从文件中复制内容到这里">
                    <button class="copy-btn" data-source="template">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <div class="structure-selector">
                    <select id="template-section" class="structure-select">
                        <option value="">选择章节</option>
                    </select>
                    <select id="template-chapter" class="structure-select">
                        <option value="">选择节</option>
                    </select>
                    <select id="template-clause" class="structure-select">
                        <option value="">选择条</option>
                    </select>
                    <button id="insert-template" class="insert-btn">插入</button>
                </div>
                <div class="file-preview" id="template-preview"></div>
            </div>
        </div>

        <div class="section">
            <h2>编制成果预览/修改/确认修改</h2>
            <p>预览、修改并确认项目编制成果</p>
            <div id="project-results">
                <button id="mark-in-progress">标记为进行中</button>
                <div id="result-content">
                    <div class="result-section">
                        <h3>第一部分：项目概况</h3>
                        <p id="section-1-content">内容将在这里显示...</p>
                    </div>
                    <div class="result-section">
                        <h3>第二部分：技术方案</h3>
                        <p id="section-2-content">内容将在这里显示...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载所有政策文件到下拉菜单
            loadFileOptions('policies', 'policies-select', 'policy-preview');
            loadFileOptions('standards', 'standards-select', 'standard-preview');
            loadFileOptions('templates', 'templates-select', 'template-preview');

            // 加载章节结构
            loadStructureOptions();

            // 复制按钮功能
            document.querySelectorAll('.copy-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const source = this.getAttribute('data-source');
                    const copyInput = document.getElementById(`${source}-copy`);
                    copyInput.select();
                    document.execCommand('copy');
                    this.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => {
                        this.innerHTML = '<i class="fas fa-copy"></i>';
                    }, 2000);
                });
            });

            // 政策选择事件
            document.getElementById('policies-select').addEventListener('change', function() {
                displayFilePreview(this, 'policies', 'policy-preview');
            });

            // 规范选择事件
            document.getElementById('standards-select').addEventListener('change', function() {
                displayFilePreview(this, 'standards', 'standard-preview');
            });

            // 模板选择事件
            document.getElementById('templates-select').addEventListener('change', function() {
                displayFilePreview(this, 'templates', 'template-preview');
            });

            // 插入按钮功能
            document.getElementById('insert-policy').addEventListener('click', function() {
                insertContent('policy');
            });

            document.getElementById('insert-standard').addEventListener('click', function() {
                insertContent('standard');
            });

            document.getElementById('insert-template').addEventListener('click', function() {
                insertContent('template');
            });

            // 加载文件选项
            function loadFileOptions(key, selectId, previewId) {
                const select = document.getElementById(selectId);
                const items = JSON.parse(localStorage.getItem(key)) || [];

                items.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.textContent = item.title;
                    select.appendChild(option);
                });

                if (items.length > 0) {
                    select.selectedIndex = 1;
                    displayFilePreview(select, key, previewId);
                }
            }

            // 显示文件预览
            function displayFilePreview(select, key, previewId) {
                const id = parseInt(select.value);
                const preview = document.getElementById(previewId);
                const items = JSON.parse(localStorage.getItem(key)) || [];

                if (id && items.length > 0) {
                    const item = items.find(i => i.id === id);
                    if (item) {
                        preview.innerHTML = `
                            <div class="preview-header">
                                <h4>${item.title}</h4>
                                <div class="file-meta">
                                    <i class="fas fa-file"></i> ${item.fileName}
                                    (${formatFileSize(item.size)})
                                </div>
                            </div>
                            <iframe src="${item.content}" class="file-preview-content"></iframe>
                        `;

                        // 自动填充复制框（可选，但根据要求保留手动复制）
                        // document.getElementById(`${key.split('s')[0]}-copy`).value = '请从预览中复制内容';
                    }
                } else {
                    preview.innerHTML = '';
                }
            }

            // 加载章节结构
            function loadStructureOptions() {
                const sections = ['第一部分', '第二部分', '第三部分', '第四部分'];
                const chapters = ['第一章', '第二章', '第三章', '第四章'];
                const clauses = ['第一条', '第二条', '第三条', '第四条'];

                ["policy", "standard", "template"].forEach(prefix => {
                    const sectionSelect = document.getElementById(`${prefix}-section`);
                    const chapterSelect = document.getElementById(`${prefix}-chapter`);
                    const clauseSelect = document.getElementById(`${prefix}-clause`);

                    sections.forEach(section => {
                        const option = document.createElement('option');
                        option.value = section;
                        option.textContent = section;
                        sectionSelect.appendChild(option);
                    });

                    chapters.forEach(chapter => {
                        const option = document.createElement('option');
                        option.value = chapter;
                        option.textContent = chapter;
                        chapterSelect.appendChild(option);
                    });

                    clauses.forEach(clause => {
                        const option = document.createElement('option');
                        option.value = clause;
                        option.textContent = clause;
                        clauseSelect.appendChild(option);
                    });
                });
            }

            // 插入内容到成果文件
            function insertContent(source) {
                const copyInput = document.getElementById(`${source}-copy`);
                const section = document.getElementById(`${source}-section`).value;
                const chapter = document.getElementById(`${source}-chapter`).value;
                const clause = document.getElementById(`${source}-clause`).value;
                const content = copyInput.value.trim();

                if (!content) {
                    alert('请先复制内容到输入框');
                    return;
                }

                if (!section || !chapter || !clause) {
                    alert('请选择完整的章节结构');
                    return;
                }

                // 在成果文件中查找对应部分
                const sectionId = section.replace(/[^\d]/g, '');
                const contentElement = document.getElementById(`section-${sectionId}-content`);

                if (contentElement) {
                    // 创建插入的HTML
                    const insertion = document.createElement('div');
                    insertion.className = 'inserted-content';
                    insertion.innerHTML = `
                        <div class="insertion-header">
                            <span class="source-type">${getSourceType(source)}</span>
                            <span class="source-title">${document.querySelector(`#${source}s-select option:checked`).textContent}</span>
                        </div>
                        <div class="inserted-text">${content}</div>
                        <div class="insertion-footer">
                            <span class="insertion-location">位置: ${section} ${chapter} ${clause}</span>
                            <button class="remove-insertion"><i class="fas fa-times"></i></button>
                        </div>
                    `;

                    contentElement.appendChild(insertion);

                    // 添加移除功能
                    insertion.querySelector('.remove-insertion').addEventListener('click', function() {
                        insertion.remove();
                    });

                    // 清空输入框
                    copyInput.value = '';
                    alert('内容已成功插入');
                } else {
                    alert('无法找到指定的插入位置');
                }
            }

            // 获取来源类型
            function getSourceType(source) {
                switch(source) {
                    case 'policy': return '政策';
                    case 'standard': return '规范';
                    case 'template': return '模板';
                    default: return '来源';
                }
            }

            // 文件大小格式化
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
        });
    </script>
</body>
</html>
